# ~/.config/kitty/kitty.conf

# ── Font ────────────────────────────────────────────────────────────────────
font_family      HackNerdFont-ExtraLight
bold_font        HackNerdFont-Regular
italic_font      HackNerdFont-ExtraLightItalic
bold_italic_font HackNerdFont-Italic
font_size        13.0

# ── Cursor ──────────────────────────────────────────────────────────────────
cursor_shape     beam
cursor_blink_interval 0.5

# ── Scrollback ───────────────────────────────────────────────────────────────
scrollback_lines 10000

# ── Window ───────────────────────────────────────────────────────────────────
window_padding_width 8
background_opacity 0.95
confirm_os_window_close 0

# ── Tabs ─────────────────────────────────────────────────────────────────────
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"
active_tab_font_style bold

# ── Catppuccin Frappé ────────────────────────────────────────────────────────
foreground              #c6d0f5
background              #303446
selection_foreground    #303446
selection_background    #f2d5cf

cursor                  #f2d5cf
cursor_text_color       #303446

url_color               #8caaee

# black
color0  #51576d
color8  #626880

# red
color1  #e78284
color9  #e78284

# green
color2  #a6d189
color10 #a6d189

# yellow
color3  #e5c890
color11 #e5c890

# blue
color4  #8caaee
color12 #8caaee

# magenta
color5  #f4b8e4
color13 #f4b8e4

# cyan
color6  #81c8be
color14 #81c8be

# white
color7  #b5bfe2
color15 #a5adce

# tab bar colors
active_tab_foreground   #303446
active_tab_background   #ca9ee6
inactive_tab_foreground #c6d0f5
inactive_tab_background #414559

# ── Keybinds ─────────────────────────────────────────────────────────────────
# Splits
map ctrl+shift+enter new_window
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window

# Tabs
map ctrl+shift+t new_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab

# Font size
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0     change_font_size all 0
shell /usr/bin/zsh
